<!DOCTYPE html>
<html>
<head>
    <title>StudyPilot AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="hero">
    <h1>StudyPilot AI</h1>
    <p>Your AI-powered study roadmap generator</p>
</div>

    <div class="controls">

        <input
            type="number"
            id="daysInput"
            placeholder="Enter number of days"
        >

        <input
            type="text"
            id="goalInput"
            placeholder="Enter learning goal"
        >

        <button id="generateBtn">
            Generate Plan
        </button>

        <input
            type="text"
            id="taskInput"
            placeholder="Enter task"
        >

        <button id="addBtn">
            Add Task
        </button>

    </div>

    <div id="studyInfo"></div>

    <ul id="taskList"></ul>

    <script src="script.js"></script>

</body>
</html>
